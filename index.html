<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Detector de Ronquidos IA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        #status { margin: 20px; font-weight: bold; color: #555; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 5px; }
        #results { margin-top: 30px; font-size: 24px; }
        .snore-active { color: red; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1>Antironquidos IA 💤</h1>
    <p>Pulsa el botón para empezar a monitorizar</p>
    
    <button id="startBtn">ACTIVAR DETECTOR</button>
    
    <div id="status">Estado: Esperando...</div>
    <div id="results"></div>

    <!-- Scripts de Edge Impulse -->
    <script src="edge-impulse-standalone.js"></script>
    <script src="run-impulse.js"></script>

    <script>
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        startBtn.onclick = async () => {
            statusDiv.innerText = "Estado: Inicializando micrófono...";
            startBtn.style.display = 'none';

            try {
                const classifier = new EdgeImpulseClassifier();
                await classifier.init();
                
                // Aquí usamos la función del navegador para capturar audio
                // y pasarle los datos a tu modelo cada segundo
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    statusDiv.innerText = "Estado: Escuchando...";
                    // Nota: Edge Impulse suele incluir una librería llamada 'WebAudio' 
                    // en sus ejemplos para manejar esto automáticamente.
                    alert("¡Detector activado! Deja el móvil cerca.");
                });
            } catch (err) {
                statusDiv.innerText = "Error: " + err;
            }
        };
    </script>
</body>
</html>
