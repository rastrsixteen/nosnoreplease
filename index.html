<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>nosnoreplease</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1a1a2e; 
            color: white; 
            padding: 20px; 
            margin: 0;
        }
        .card { 
            background: #16213e; 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 450px; 
            margin: 20px auto; 
        }
        h1 { color: #e94560; margin-bottom: 10px; font-size: 2em; }
        #status { 
            color: #4ecca3; 
            margin: 20px 0; 
            font-weight: bold;
            min-height: 1.5em;
        }
        #prediction-list { list-style: none; padding: 0; margin-top: 20px; }
        .label-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 5px;
            font-size: 1.1em;
            text-transform: capitalize;
        }
        .progress-container {
            width: 100%; 
            background: #0f3460; 
            height: 12px; 
            border-radius: 6px; 
            margin-bottom: 15px;
            overflow: hidden;
        }
        .score-bar { 
            background: #4ecca3; 
            height: 100%; 
            width: 0%;
            transition: width 0.2s ease-out; 
        }
        button { 
            background: #e94560; 
            color: white; 
            border: none; 
            padding: 18px 30px; 
            border-radius: 50px; 
            font-size: 1.1em; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }
        hr { border: 0; border-top: 1px solid #0f3460; margin: 25px 0; }
    </style>
</head>
<body>

    <div class="card">
        <h1>nosnoreplease 💤</h1>
        <p>Detector de ronquidos con IA</p>
        
        <button id="startBtn">COMENZAR VIGILANCIA</button>
        
        <div id="status">Listo para empezar</div>
        
        <hr>
        
        <div id="results">
            <h3 style="color: #8892b0;">Detección en vivo:</h3>
            <div id="prediction-list">
                <!-- Aquí aparecerán los ronquidos dinámicamente -->
            </div>
        </div>
    </div>

    <!-- CARGA DE SCRIPTS: Usamos ./ para asegurar la ruta en GitHub Pages -->
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>

    <script>
        const predictionList = document.getElementById('prediction-list');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');

        // Esta función la llama el archivo run-impulse.js constantemente
        window.updateUI = (results) => {
            predictionList.innerHTML = '';
            results.forEach(res => {
                const percentage = (res.value * 100).toFixed(0);
                predictionList.innerHTML += `
                    <div class="label-row">
                        <span>${res.label}</span>
                        <span>${percentage}%</span>
                    </div>
                    <div class="progress-container">
                        <div class="score-bar" style="width: ${percentage}%"></div>
                    </div>
                `;
            });
        };

        startBtn.onclick = async () => {
            statusDiv.innerText = "Iniciando motor de IA...";
            
            // Verificación de seguridad para asegurar que la librería cargó
            if (typeof EdgeImpulseClassifier === 'undefined') {
                statusDiv.innerHTML = "<span style='color: #e94560;'>Error: Librería no detectada.<br>Refresca la página en 5 segundos.</span>";
                return;
            }

            try {
                // Inicializamos el clasificador de Edge Impulse
                const classifier = new EdgeImpulseClassifier();
                await classifier.init();
                
                statusDiv.innerText = "Escuchando... Deja el móvil cerca.";
                startBtn.style.display = 'none';
                
                // Intentamos activar el WakeLock (evita que la pantalla se apague)
                if ('wakeLock' in navigator) {
                    try {
                        await navigator.wakeLock.request('screen');
                    } catch (err) {
                        console.warn("WakeLock no soportado o denegado.");
                    }
                }
            } catch (e) {
                statusDiv.innerHTML = "<span style='color: #e94560;'>Error: " + e + "</span>";
                console.error(e);
            }
        };
    </script>

</body>
</html>
