<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>nosnoreplease</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a2e; color: white; padding: 20px; }
        .card { background: #16213e; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 500px; margin: auto; }
        #status { color: #4ecca3; margin: 15px 0; font-size: 1.2em; }
        #prediction-list { list-style: none; padding: 0; font-size: 1.5em; }
        .label-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #0f3460; }
        .score-bar { background: #4ecca3; height: 10px; border-radius: 5px; transition: width 0.3s; }
        button { background: #e94560; color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.2em; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h1>nosnoreplease 💤</h1>
        <button id="startBtn">COMENZAR VIGILANCIA</button>
        <div id="status">Haz clic para activar el micro</div>
        <hr>
        <div id="results">
            <h3>Detección en vivo:</h3>
            <div id="prediction-list"></div>
        </div>
    </div>

    <!-- CARGA DE SCRIPTS CON PAUSA PARA EVITAR ERRORES -->
    <!-- Busca estas dos líneas en tu index.html y cámbialas por esto -->
    <script src="./edge-impulse-standalone.js"></script>
    <script src="./run-impulse.js"></script>

    <script>
        // Añadimos esto para verificar qué está pasando exactamente
        window.onerror = function(msg, url, line) {
            statusDiv.innerText = "Error cargando archivo: " + msg;
            return false;
        };

        // ... resto de tu código del botón ...

    <script>
        const predictionList = document.getElementById('prediction-list');
        const statusDiv = document.getElementById('status');

        window.updateUI = (results) => {
            predictionList.innerHTML = '';
            results.forEach(res => {
                const percentage = (res.value * 100).toFixed(0);
                predictionList.innerHTML += `
                    <div class="label-row">
                        <span>${res.label}:</span>
                        <span>${percentage}%</span>
                    </div>
                    <div style="width: 100%; background: #0f3460; height: 10px; border-radius: 5px; margin-bottom: 10px;">
                        <div class="score-bar" style="width: ${percentage}%"></div>
                    </div>
                `;
            });
        };

        document.getElementById('startBtn').onclick = async () => {
            statusDiv.innerText = "Iniciando motor de IA...";
            
            // Verificamos si la librería cargó antes de llamar a la clase
            if (typeof EdgeImpulseClassifier === 'undefined') {
                statusDiv.innerText = "Error: La librería aún no ha cargado. Espera 5 segundos y reintenta.";
                return;
            }

            try {
                const classifier = new EdgeImpulseClassifier();
                await classifier.init();
                statusDiv.innerText = "Escuchando ronquidos...";
                document.getElementById('startBtn').style.display = 'none';
                
                // WakeLock para que no se apague la pantalla
                if ('wakeLock' in navigator) {
                    await navigator.wakeLock.request('screen');
                }
            } catch (e) {
                statusDiv.innerText = "Error: " + e;
                console.error(e);
            }
        };
    </script>
</body>
</html>
